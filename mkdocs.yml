site_name: Buyers Documentation
theme:
  name: material
  logo: img/logo.svg
  favicon: img/logo.svg
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  palette:
    scheme: slate # тёмная тема по умолчанию
    primary: orange
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - search.highlight
    - content.code.copy

extra_css:
  - css/extra.css

extra_javascript:
  - javascript/extra.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - glightbox

nav:
  - Главная: index.md
  - Кампании в AIO: 
      - Как попасть в кампанию и что внутри: aio/campaigns/campaign-desc.md
      - Как сгенерировать ссылку для залива: aio/campaigns/how-to-generate-link.md
  - Регламенты для задач:
      - Регламент задачи на сетапы Facebook: aio/regulations/regulations-fb.md
      - Регламент задачи на сетапы Google: aio/regulations/regulations-google.md
  - Аккаунт:
      - Как запросить аккаунт в AIO: aio/account/how-to-ask-for-account.md
      - Регистрация в AIO с помощью ссылки: aio/account/how-to-register.md
